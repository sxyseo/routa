schema: hook-runtime-v1

profiles:
  pre-commit:
    phases:
      - fitness-fast
    metrics:
      - eslint_pass

  pre-push:
    phases:
      - submodule
      - fitness
      - review
    metrics:
      - eslint_pass
      - ts_typecheck_pass
      - ts_test_pass
      - ts_test_pass_full
      - clippy_pass
      - rust_test_pass

  local-validate:
    phases:
      - fitness
      - review
    metrics:
      - eslint_pass
      - ts_typecheck_pass
      - ts_test_pass
      - ts_test_pass_full
      - clippy_pass
      - rust_test_pass
