name: 'Page Snapshot Validation'

on:
  pull_request:
    paths:
      - 'resources/page-snapshot-registry.json'
      - 'scripts/generate-snapshots.mjs'
      - 'scripts/page-snapshot-lib.mjs'
      - 'scripts/validate-snapshots.mjs'
      - 'src/app/**/page.tsx'
      - 'src/app/**/page.snapshot.yaml'
      - 'src/app/api/page-snapshots/route.ts'
      - 'src/core/testing/**'
      - '.github/workflows/page-snapshot-validation.yml'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'resources/page-snapshot-registry.json'
      - 'scripts/generate-snapshots.mjs'
      - 'scripts/page-snapshot-lib.mjs'
      - 'scripts/validate-snapshots.mjs'
      - 'src/app/**/page.tsx'
      - 'src/app/**/page.snapshot.yaml'
      - 'src/app/api/page-snapshots/route.ts'
      - 'src/core/testing/**'
      - '.github/workflows/page-snapshot-validation.yml'
      - 'package.json'
  workflow_dispatch:

jobs:
  validate-ci-snapshots:
    name: 'Validate CI Snapshot Targets'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate stable page snapshots
        run: xvfb-run -a npm run snapshots:validate -- --ci

      - name: Upload snapshot validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: page-snapshot-report
          path: test-results/page-snapshot-report.json
          retention-days: 30
