# Defense-in-Depth CI Pipeline
#
# 摒弃传统针对 DX 的"宽容度"，用硬性约束封锁 AI 的乱写空间。
# 通过持续演进的架构约束实现深度防御：
#   - 控制爆炸半径：通过权限和行为约束限定 AI 的操作范围
#   - 反熵增机制：设立质量门槛与技术债检查，将 AI 的解空间限制在安全边界内
#
# Hard Gates（任一失败直接阻断）:
#   - ts_test_pass: TypeScript 测试必须 100% 通过
#   - rust_test_pass: Rust 测试必须 100% 通过
#   - api_contract_parity: API 契约必须一致
#   - lint_pass: Lint 必须 0 错误
#   - no_critical_vulnerabilities: 无严重安全漏洞

name: 'Defense'

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  schedule:
    # 每周一 UTC 00:00 运行 security 维度
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  NODE_ENV: test

jobs:
  # ══════════════════════════════════════════════════════════════
  # HARD GATE: Fitness CI (统一由 entrix 驱动)
  # ══════════════════════════════════════════════════════════════
  fitness-ci:
    name: 'Gate: Fitness'
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install entrix
        run: pip install -e tools/entrix

      - name: Run fitness check
        id: fitness
        run: |
          mkdir -p .artifacts
          entrix run --parallel --tier normal --scope ci --min-score 0 --output .artifacts/fitness-report.json

      - name: Summary
        if: always()
        run: |
          {
            echo "## Fitness Report"
            echo ""
            echo "| Gate | Status |"
            echo "|------|--------|"
            echo "| Fitness CI | ${{ steps.fitness.outcome == 'success' && '✅' || '❌' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f .artifacts/fitness-report.json ]; then
            python3 -c 'import json; from pathlib import Path; payload=json.loads(Path(".artifacts/fitness-report.json").read_text(encoding="utf-8")); print(""); print("- Final score: {:.1f}".format(payload.get("final_score", 0))); print("- Hard gate blocked: {}".format(payload.get("hard_gate_blocked", False))); print("- Score blocked: {}".format(payload.get("score_blocked", False))); [print("- {}: score={:.1f} passed={}/{}".format(dimension["name"], dimension["score"], dimension["passed"], dimension["total"])) for dimension in payload.get("dimensions", [])]' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload fitness artifact
        if: always() && hashFiles('.artifacts/fitness-report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: fitness-report
          path: .artifacts/fitness-report.json

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: 依赖漏洞扫描
  # ══════════════════════════════════════════════════════════════
  dependency-scan:
    name: 'Security: Dependency Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical)
        run: npm audit --audit-level=critical
        continue-on-error: false

      - name: npm audit (high) - report only
        run: npm audit --audit-level=high || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: cargo audit
        run: cargo audit
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: Semgrep SAST 扫描
  # ══════════════════════════════════════════════════════════════
  semgrep:
    name: 'Security: Semgrep SAST'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (security-audit + OWASP)
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/javascript \
            --sarif \
            --output=semgrep-results.sarif \
            .
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif

      - name: Semgrep strict (ERROR only, fail on match)
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --severity=ERROR \
            --error \
            .

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: Trivy 文件系统扫描
  # ══════════════════════════════════════════════════════════════
  trivy:
    name: 'Security: Trivy Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: Dockerfile 检查
  # ══════════════════════════════════════════════════════════════
  hadolint:
    name: 'Security: Hadolint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint Dockerfile
        if: steps.dockerfile.outputs.exists == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: 汇总
  # ══════════════════════════════════════════════════════════════
  security-summary:
    name: 'Security Summary'
    runs-on: ubuntu-latest
    needs: [dependency-scan, semgrep, trivy, hadolint]
    if: always()
    steps:
      - name: Summary
        run: |
          {
            echo "## Defense / Security Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Dependency Scan | ${{ needs.dependency-scan.result == 'success' && '✅' || '❌' }} |"
            echo "| Semgrep SAST | ${{ needs.semgrep.result == 'success' && '✅' || '❌' }} |"
            echo "| Trivy | ${{ needs.trivy.result == 'success' && '✅' || '❌' }} |"
            echo "| Hadolint | ${{ needs.hadolint.result == 'success' && '✅' || '❌' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
