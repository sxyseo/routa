name: "Storybook Governance"

on:
  pull_request:
    paths:
      - ".storybook/**"
      - "src/client/components/**"
      - "scripts/validate-storybook-governance.mjs"
      - "docs/fitness/design-system-quality-layers.md"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]
    paths:
      - ".storybook/**"
      - "src/client/components/**"
      - "scripts/validate-storybook-governance.mjs"
      - "docs/fitness/design-system-quality-layers.md"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

jobs:
  storybook-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Storybook governance
        run: npm run storybook:governance

      - name: Build Storybook
        run: npm run storybook:build

      - name: Publish to Chromatic (optional)
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        uses: chromaui/action@latest
        with:
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
