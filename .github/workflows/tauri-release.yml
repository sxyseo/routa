name: 'Tauri Release'

on:
  workflow_call:
    inputs:
      version:
        description: "Semver version to release, ex: 0.2.4"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to release, ex: 0.2.4"
        required: true
        type: string

jobs:
  build-tauri:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            arch: 'arm64'
            key: 'darwin-arm64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            arch: 'x64'
            key: 'darwin-x64'
          - platform: 'ubuntu-22.04'
            args: ''
            arch: 'x64'
            key: 'linux-x64'
          - platform: 'windows-latest'
            args: ''
            arch: 'x64'
            key: 'windows-x64'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Sync release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version || github.event.inputs.version }}
        run: node scripts/release/sync-release-version.mjs --version "${RELEASE_VERSION}"

      - name: Verify synced release files
        shell: bash
        run: |
          # Use while read loop instead of mapfile for Bash 3 compatibility
          changed_files=()
          while IFS= read -r line; do
            changed_files+=("$line")
          done < <(git diff --name-only)

          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "Release version already aligned"
            exit 0
          fi

          allowed_files=(
            "package.json"
            "apps/desktop/package.json"
            "apps/desktop/src-tauri/Cargo.toml"
            "apps/desktop/src-tauri/tauri.conf.json"
            "packages/routa-cli/package.json"
          )

          for file in "${changed_files[@]}"; do
            case " ${allowed_files[*]} " in
              *" ${file} "*) ;;
              *)
                echo "Unexpected file changed during release version sync: ${file}" >&2
                exit 1
                ;;
            esac
          done

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            libclang-dev \
            cmake \
            build-essential

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Create placeholder frontend directory (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p apps/desktop/src-tauri/frontend
          echo "Placeholder for Tauri build" > apps/desktop/src-tauri/frontend/.placeholder

      - name: Create placeholder frontend directory (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path apps/desktop/src-tauri/frontend
          echo "Placeholder for Tauri build" > apps/desktop/src-tauri/frontend/.placeholder

      - name: Prepare frontend for Tauri bundling
        run: node scripts/prepare-frontend.mjs

      - name: Install Entrix
        run: python -m pip install -e tools/entrix

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      - name: Generate release manifest
        shell: bash
        run: |
          node scripts/release/generate-release-manifest.mjs \
            --tauri-bundle-dir apps/desktop/src-tauri/target \
            --static-dir apps/desktop/src-tauri/frontend \
            --channel latest \
            --out dist/release/manifest-${{ matrix.key }}.json

      - name: Fetch baseline manifest
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/release/fetch-release-baseline.py \
            --repo phodal/routa \
            --workflow tauri-release.yml \
            --artifact-name routa-release-manifest-tauri-${{ matrix.key }} \
            --exclude-run-id "${{ github.run_id }}" \
            --out dist/release/baseline-manifest-${{ matrix.key }}.json

      - name: Guard release surface
        shell: bash
        run: |
          if [[ -f dist/release/baseline-manifest-${{ matrix.key }}.json ]]; then
            entrix release-trigger \
              --manifest dist/release/manifest-${{ matrix.key }}.json \
              --baseline-manifest dist/release/baseline-manifest-${{ matrix.key }}.json \
              --fail-on-trigger
          else
            entrix release-trigger \
              --manifest dist/release/manifest-${{ matrix.key }}.json \
              --fail-on-trigger
          fi

      - name: Upload bundled assets
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-assets-${{ matrix.key }}
          path: |
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.app
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
          if-no-files-found: error

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: routa-release-manifest-tauri-${{ matrix.key }}
          path: dist/release/manifest-${{ matrix.key }}.json

  verify-tauri:
    name: Verify staged desktop release
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download release manifests
        uses: actions/download-artifact@v4
        with:
          pattern: routa-release-manifest-tauri-*
          path: dist/release/manifests
          merge-multiple: true

      - name: Install Entrix
        run: python -m pip install -e tools/entrix

      - name: Verify all release manifests
        shell: bash
        run: |
          shopt -s nullglob
          manifests=(dist/release/manifests/*.json)
          if [[ ${#manifests[@]} -eq 0 ]]; then
            echo "No Tauri release manifests found" >&2
            exit 1
          fi
          for manifest in "${manifests[@]}"; do
            echo "Verifying ${manifest}"
            entrix release-trigger --manifest "${manifest}" --fail-on-trigger
          done

  publish-tauri:
    name: Publish desktop release
    permissions:
      contents: write
    needs:
      - build-tauri
      - verify-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Download bundled assets
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-release-assets-*
          path: dist/tauri-release
          merge-multiple: true

      - name: Publish draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version || github.event.inputs.version }}
          name: Routa Desktop v${{ inputs.version || github.event.inputs.version }}
          body: |
            See the assets to download and install Routa Desktop.

            CLI install:
            - `npm install -g routa-cli`
            - `npx -p routa-cli routa --help`
          draft: true
          prerelease: false
          files: |
            dist/tauri-release/**/*.dmg
            dist/tauri-release/**/*.app
            dist/tauri-release/**/*.deb
            dist/tauri-release/**/*.AppImage
            dist/tauri-release/**/*.msi
            dist/tauri-release/**/*.exe
