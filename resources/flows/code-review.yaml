# Code Review Workflow — four-phase review with confidence gating
#
# Usage:
#   routa workflow run resources/flows/code-review.yaml --trigger-payload "Review PR #42 in owner/repo"

name: "Code Review Flow"
description: "Four-phase code review with confidence-based filtering"
version: "2.0"

trigger:
  type: manual

variables:
  model: "${ANTHROPIC_MODEL:-glm-5.1}"
  confidence_threshold: "7"

steps:
  - name: "Phase 1 - Context Gathering"
    specialist: "pr-reviewer"
    adapter: "claude-code-sdk"
    config:
      model: "${model}"
    input: |
      You are running phase 1 only.

      Task:
      ${trigger.payload}

      Gather project context (tech stack, lint coverage, conventions, custom review rules).
      Do not output review findings yet.
    output_key: "project_context"

  - name: "Phase 2 - Diff Analysis"
    specialist: "pr-reviewer"
    adapter: "claude-code-sdk"
    config:
      model: "${model}"
    input: |
      You are running phase 2 only.

      ## Phase 1 Context
      ${steps.Phase 1 - Context Gathering.output}

      ## Task
      ${trigger.payload}

      Analyze only PR-introduced changes and return raw findings.
    output_key: "raw_findings"

  - name: "Phase 3 - False Positive Filter"
    specialist: "gate"
    adapter: "claude-code-sdk"
    config:
      model: "${model}"
    input: |
      You are running phase 3 only.

      ## Phase 1 Context
      ${steps.Phase 1 - Context Gathering.output}

      ## Phase 2 Raw Findings
      ${steps.Phase 2 - Diff Analysis.output}

      Validate findings and apply false-positive suppression.
      Keep only findings with confidence >= ${confidence_threshold}.
      Reject low-confidence or rule-based false positives.
    output_key: "validated_findings"

  - name: "Phase 4 - Final Review Report"
    specialist: "pr-analyzer"
    adapter: "claude-code-sdk"
    config:
      model: "${model}"
    input: |
      You are running phase 4 only.

      ## Context
      ${steps.Phase 1 - Context Gathering.output}

      ## Raw Findings
      ${steps.Phase 2 - Diff Analysis.output}

      ## Validated Findings
      ${steps.Phase 3 - False Positive Filter.output}

      Generate final concise report and final verdict.
      Use the workflow confidence threshold from ${confidence_threshold}.
      If no high-confidence findings remain, output "No significant issues found".
    output_key: "verdict"
