id: team-automation
goal: >
  在 team 页面触发协作链路并验证 session 状态反馈、参与者可见信息和页面交互一致性。
entry_url: "http://localhost:3000/workspace/default/team"
preconditions:
  - "team 页面可访问"
  - "存在可触发团队自动化的入口"
execution_notes:
  - "从 Team 列表页开始，只触发 1 次团队流程；如果成功进入 team run 页面，停留在 team 相关页面内观察，不要跳去别的工作区页面。"
  - "优先使用页面上最明显的触发入口，不做无关配置编辑。"
  - "拿到 session 标识、成员状态、live/reconnecting 状态或团队反馈后即可截图并结束。"
observation_targets:
  - "触发入口、提交反馈、Team run 页面跳转"
  - "页面中的 Session 标识、成员状态、provider/live 状态"
  - "错误提示、重试入口和流程恢复能力"
stop_conditions:
  - "如果 Team run 页面已显示 Session 标识、成员状态或 live/reconnecting 状态中的任意一项，就立即截图并结束。"
  - "如果触发后 10 秒内没有任何状态变化，或出现白屏/500/连续错误对话框，就记录失败并结束。"
success_signals:
  - "触发团队流程成功"
  - "可见协作状态更新（提示/卡片/日志）"
  - "页面保持可继续交互，无明显卡死"
failure_signals:
  - "提交后无状态变化"
  - "提示信息错误或不可读"
  - "出现页面白屏、重复错误对话框或 500"
score_rubric: |
  重点关注：
  1. 从触发到反馈是否连贯
  2. 团队协作信息是否清晰可追踪
  3. 反馈状态是否可验证且一致
  4. 页面是否能在流程中恢复并继续交互
