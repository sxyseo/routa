syntax = "proto3";

package routa.office.v1;

message OfficeArtifact {
  string source_kind = 1;
  string title = 2;
  repeated TextBlock text_blocks = 3;
  repeated Sheet sheets = 4;
  repeated Slide slides = 5;
  repeated Diagnostic diagnostics = 6;
  repeated MetadataEntry metadata = 7;
  repeated ImageAsset images = 8;
  repeated Table tables = 9;
  repeated Chart charts = 10;
}

message TextBlock {
  string path = 1;
  string text = 2;
}

message Sheet {
  string name = 1;
  repeated Row rows = 2;
  repeated MergedRange merged_ranges = 3;
  repeated SheetTable tables = 4;
  repeated DataValidation data_validations = 5;
  repeated ConditionalFormat conditional_formats = 6;
}

message Table {
  string path = 1;
  repeated Row rows = 2;
}

message MergedRange {
  string reference = 1;
}

message SheetTable {
  string name = 1;
  string reference = 2;
}

message DataValidation {
  string type = 1;
  string operator = 2;
  string formula1 = 3;
  string formula2 = 4;
  repeated string ranges = 5;
}

message ConditionalFormat {
  string type = 1;
  uint32 priority = 2;
  repeated string ranges = 3;
}

message Row {
  repeated Cell cells = 1;
}

message Cell {
  string address = 1;
  string text = 2;
  string formula = 3;
}

message Slide {
  uint32 index = 1;
  string title = 2;
  repeated TextBlock text_blocks = 3;
}

message Diagnostic {
  string level = 1;
  string message = 2;
}

message MetadataEntry {
  string key = 1;
  string value = 2;
}

message ImageAsset {
  string id = 1;
  string path = 2;
  string content_type = 3;
  bytes bytes = 4;
}

message Chart {
  string id = 1;
  string path = 2;
  string title = 3;
  string chart_type = 4;
}
